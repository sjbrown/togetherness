name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run unit tests
        run: bin/test.github_wrapper.sh unit

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    # E2E is slower — only run on PRs and main/develop pushes
    if: github.event_name == 'pull_request' || contains('["main","develop"]', github.ref_name)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run e2e tests
        run: bin/test.github_wrapper.sh e2e
