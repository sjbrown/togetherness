name: crdt-svg-test

services:
  test:
    build:
      context: .
      dockerfile: docker/test.Dockerfile

  signaling:
    build:
      context: .
      dockerfile: docker/signaling.Dockerfile

  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    depends_on:
      - signaling
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://app:80"]
      interval: 2s
      timeout: 3s
      retries: 10

  # Playwright e2e tests — runs after app + signaling are up
  # dns section
  # -----------
  #  Chromium uses it's own dns and doesn't resolve http://app
  e2e:
    dns:
      - 127.0.0.11
    build:
      context: .
      dockerfile: docker/e2e.Dockerfile
    environment:
      - APP_URL=http://app:80
      - SIGNALING_URL=ws://signaling:4444
    depends_on:
      app:
        condition: service_healthy
      signaling:
        condition: service_started
