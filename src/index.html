<!DOCTYPE html>
<html lang="en">

<link rel="icon" type="image/svg+xml"

<body>

<!-- ── Canvas stage ──────────────────────────────────────────────────────── -->
<div id="stage">
  <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="default-local-sel-grad"
          x1="0.000" y1="0.500"
          x2="1.000" y2="0.500"
          ><stop offset="0%" stop-color="hsl(160, 100%, 55%)"></stop ><stop offset="100%" stop-color="hsl(165, 90%, 45%)"></stop ></linearGradient>
        <linearGradient id="default-remote-sel-grad"
          x1="0.000" y1="0.500"
          x2="1.000" y2="0.500"
          ><stop offset="0%"
          stop-color="hsl(180, 100%, 55%)"></stop
          ><stop offset="100%"
          stop-color="hsl(185, 90%, 45%)"></stop
        ></linearGradient>
        <!-- drag-placeholder-filter injected by defs.js via the module script below -->
      </defs>
    <g id="background-layer">
      <rect x="0" y="0" width="100%" height="100%" fill="url(#bg-pattern)" pointer-events="none"/>
    </g>
    <g id="boundaries-positions-layer"></g>
    <g id="toys-layer"></g>
    <g id="drawing-layer"></g>
    <g id="overlay-layer" pointer-events="none"></g>
  </svg>
  <div id="draw-preview"></div>
</div>

<!-- ── Identity bar (slides in when menu / panel active) ──────────────────── -->
<div id="idbar" aria-hidden="true">
  <a class="idbar-project" href="home.html">crdt-svg</a>
  <span class="idbar-sep"></span>
  <span class="idbar-user">me · ????</span>
  <span class="idbar-room">#????</span>
</div>

<!-- ── Toasts ─────────────────────────────────────────────────────────────── -->
<div id="toasts" aria-live="polite"></div>

<!-- ── Info button (top-right) ────────────────────────────────────────────── -->
<button id="infoBtn" aria-label="Gestures and help" onclick="UI.openSheet('gestures')">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="12" cy="12" r="9"/>
    <path d="M12 8h.01M11 12h1v4h1"/>
  </svg>
</button>

<!-- ── Pill (bottom-centre desktop / bottom-left mobile) ──────────────────── -->
<div id="pill"></div>
<div id="toolOpts"></div>

<!-- ── Menu button (bottom-right) ─────────────────────────────────────────── -->
<button id="menuBtn" aria-label="Menu" onclick="UI.toggleMenu()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
    <circle cx="12" cy="5"  r="1.2" fill="currentColor" stroke="none"/>
    <circle cx="12" cy="12" r="1.2" fill="currentColor" stroke="none"/>
    <circle cx="12" cy="19" r="1.2" fill="currentColor" stroke="none"/>
  </svg>
</button>

<!-- ── Menu items (fan up from menu button) ───────────────────────────────── -->
<div id="menuItems">
  <div class="menu-item" onclick="UI.openSheet('edit');UI.closeMenu()">
    <span class="menu-label">Edit</span>
    <span class="menu-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
    </span>
  </div>
  <div class="menu-item" onclick="UI.openSheet('tools');UI.closeMenu()">
    <span class="menu-label">Tools</span>
    <span class="menu-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="6" width="16" height="12" rx="2"/>
      </svg>
    </span>
  </div>
  <div class="menu-item" onclick="UI.openSheet('history');UI.closeMenu()">
    <span class="menu-label">History &amp; Undo</span>
    <span class="menu-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 14L4 9l5-5"/><path d="M4 9h11a6 6 0 0 1 0 12H9"/>
      </svg>
    </span>
  </div>
  <div class="menu-item" onclick="UI.openSheet('peers');UI.closeMenu()">
    <span class="menu-label">Peers</span>
    <span class="menu-circle" style="position:relative">

        <circle cx="9" cy="8" r="3"/><path d="M3 20a6 6 0 0 1 12 0"/>
        <circle cx="17" cy="9" r="2.5"/><path d="M16 20a5 5 0 0 1 5-5"/>
      </svg>

    </span>
  </div>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/><path d="M12 2L2 7l10 5 10-5z"/>
      </svg>
    </span>
  </div>
  <div class="menu-item" onclick="UI.openSheet('save');UI.closeMenu()">

        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/>
      </svg>
    </span>
  </div>

<!-- ── Scrim (mobile bottom-sheet backdrop) ───────────────────────────────── -->
<div id="scrim"></div>

<!-- ── Side panel (persistent desktop sidebar / full-screen mobile sheet) ─── -->
<aside id="panel" aria-hidden="true">
  <div class="grab"></div>
  <div class="panel-head">
    <h2 id="panelTitle"></h2>
    <button class="panel-close" aria-label="Close panel" onclick="UI.closePanel()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 6l12 12M18 6L6 18"/>
      </svg>
    </button>
  </div>
  <div id="panelTabs"></div>
  <div class="panel-body" id="panelBody"></div>
</aside>

<!-- ── Context popover (long-press on shape) ──────────────────────────────── -->
<div id="popover"></div>

<!-- ── Status bar (retained from old index.html for debugging) ────────────── -->
<div id="statusBar" style="position:fixed;top:0;left:50%;transform:translateX(-50%);
     font-size:11px;color:var(--text-3);pointer-events:none;z-index:100;
     display:flex;gap:10px;padding:4px 8px">
  <span id="roomLabel" style="font-family:monospace"></span>
  <span id="myIdLabel" style="font-family:monospace"></span>
  <span class="status-dot" id="statusDot" style="width:8px;height:8px;border-radius:50%;
        background:var(--warn);align-self:center;flex-shrink:0"></span>
  <span>peers: <span id="peerCount">0</span></span>
  <span>drawings: <span id="drawingCount">0</span></span>
  <span>toys: <span id="toyCount">0</span></span>
</div>

<!-- ── Module imports ─────────────────────────────────────────────────────── -->
<script type="importmap">
{
  "imports": {
    "yjs": "/lib/yjs.js"
  }
}
</script>

<script type="module">
import * as Y                   from '/lib/yjs.js';
import { WebrtcProvider }       from '/lib/y-webrtc.js';
import { IndexeddbPersistence } from '/lib/y-indexeddb.js';
import { boot }                 from '/app.js';
import * as UI                  from '/ui.js';
import { App, makeDoc }         from '/app.js';
import { entityGradient }            from './entity_gradient.js';
import { dragPlaceholderFilterSVG, snapPointGradientSVG }  from './defs.js';

// Inject shared SVG defs (filters etc.) into the canvas <defs> element.
document.querySelector('#canvas defs')
  .insertAdjacentHTML('beforeend', dragPlaceholderFilterSVG);
document.querySelector('#canvas defs')
  .insertAdjacentHTML('beforeend', snapPointGradientSVG);


// Expose UI and App on window so inline onclick handlers in the HTML can reach them.
// This is the ONLY global we deliberately leak — everything else stays in modules.
window.UI  = UI;
window.App = App;

// ── Player identity store ────────────────────────────────────────────────────
// Persistent identity lives in IndexedDB 'crdt-svg-player', store 'identity'.
// Keys:
//   'name'    — display name string
//   'grad'    — full entityGradient() output object (stored frozen so gradient
//               is immune to future changes in entityGradient's algorithm)
//   'localId' — persistent peer id, format tt-p-v1-DD-XXX
// home.html writes these via the same store when the profile panel is saved.
function openPlayerStore() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('crdt-svg-player', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('identity');
    req.onsuccess       = e => resolve(e.target.result);
    req.onerror         = e => reject(e.target.error);
  });
}
async function playerGet(db, key) {
  return new Promise((res, rej) => {
    const r = db.transaction('identity', 'readonly').objectStore('identity').get(key);
    r.onsuccess = () => res(r.result ?? null);
    r.onerror   = () => rej(r.error);
  });
}
async function playerSet(db, key, value) {
  return new Promise((res, rej) => {
    const r = db.transaction('identity', 'readwrite').objectStore('identity').put(value, key);
    r.onsuccess = () => res();
    r.onerror   = () => rej(r.error);
  });
}

function makeLocalId() {
  const dd   = String(new Date().getDate()).padStart(2, '0');
  const chars = 'abcdefghijklmnopqrstuvwxyz';
  const rand  = Array.from({ length: 3 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
  return `tt-p-v1-${dd}-${rand}`;
}

async function resolveIdentity() {
  const db = await openPlayerStore();

  let name = await playerGet(db, 'name');
  if (!name) {
    name = Math.random().toString(36).slice(2, 9);
    await playerSet(db, 'name', name);
  }

  let grad = await playerGet(db, 'grad');
  if (!grad || !grad.c1) {
    // First visit
    grad = entityGradient(name);
    await playerSet(db, 'grad', grad);
  }

  let localId = await playerGet(db, 'localId');
  if (!localId) {
    localId = makeLocalId();
    await playerSet(db, 'localId', localId);
  }

  return { name, grad, localId };
}

// ── Identity ─────────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2, 9);
let roomId = location.hash.slice(1);
if (!roomId) { roomId = uid(); location.hash = roomId; }

const { name: myDisplayName, grad: myGrad, localId: myId } = await resolveIdentity();

document.getElementById('roomLabel').textContent = roomId;
document.getElementById('myIdLabel').textContent = `me: ${myDisplayName}`;

// ── Yjs ─────────────────────────────────────────────────────────────────────
export const CURRENT_SCHEMA = 4;

const { ydoc, yMeta, yToys, yToyMeta, yDrawing, yDrawingMeta, yBounPos, yBounPosMeta } = makeDoc();

// ── Persistence ─────────────────────────────────────────────────────────────
const TABLES_KEY = 'crdt_svg_tables';
function touchTableRecord(id) {
  let tables = [];
  try { tables = JSON.parse(localStorage.getItem(TABLES_KEY)) || []; } catch {}
  const existing = tables.findIndex(t => t.id === id);
  if (existing >= 0) {
    tables[existing].lastVisit = Date.now();
  } else {
    tables.push({ id, name: id, lastVisit: Date.now() });
    if (tables.length > 20) tables.splice(0, tables.length - 20);
  }
  try { localStorage.setItem(TABLES_KEY, JSON.stringify(tables)); } catch {}
}

const persistence = new IndexeddbPersistence(`crdt-svg:${roomId}`, ydoc);
persistence.on('synced', () => {
  App.addLog('loaded from indexeddb', 'local');
  touchTableRecord(roomId);
  if (!yMeta.get('docId')) {
    // Brand-new room entered directly (not via home.html). Seed doc metadata;
    // background defaults to slatehex via renderBackgroundLayer() fallback.
    ydoc.transact(() => {
      yMeta.set('docId',         roomId);
      yMeta.set('created',       new Date().toISOString());
      yMeta.set('schemaVersion', CURRENT_SCHEMA);
    });
  }
});

// ── WebRTC  ──────────────────────────────────────────────────────────────────
const signalingUrl = new URLSearchParams(location.search).get('signaling') || 'ws://localhost:4444';
const provider     = new WebrtcProvider(roomId, ydoc, { signaling: [signalingUrl] });
const awareness    = provider.awareness;
awareness.setLocalState({ id: myId, color: myGrad.c1, grad: myGrad, cursor: null, selection: null });

// ── Boot ─────────────────────────────────────────────────────────────────────
boot({ ydoc, yMeta, yToys, yToyMeta, yDrawing, yDrawingMeta, yBounPos, yBounPosMeta, awareness, provider, myId, myGrad, roomId, displayName: myDisplayName });
</script>

</body>
</html>
