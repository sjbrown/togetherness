<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Togetherness Table</title>
<link rel="icon" type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='black'/%3E%3Ctext x='3' y='26' font-size='26' fill='%23fffff0' font-family='serif' letter-spacing='-5'%3ETT%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="/ui.css">
</head>
<body>

<!-- ── Canvas stage ──────────────────────────────────────────────────────── -->
<div id="stage">
  <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- local-sel-grad: player's own selection ring gradient.
             Stops are updated at boot by Overlay.setLocalGradient(myGrad). -->
        <linearGradient id="local-sel-grad"
          x1="0.000" y1="0.500"
          x2="1.000" y2="0.500"
          ><stop id="local-sel-grad-stop0" offset="0%"  stop-color="hsl(160, 100%, 55%)"></stop
          ><stop id="local-sel-grad-stop1" offset="100%" stop-color="hsl(165, 90%, 45%)"></stop
        ></linearGradient>
        <!-- drag-placeholder-filter injected by defs.js via the module script below -->
      </defs>
    <g id="background-layer">
      <rect x="0" y="0" width="100%" height="100%" fill="url(#bg-pattern)" pointer-events="none"/>
    </g>
    <g id="boundaries-positions-layer"></g>
    <g id="toys-layer"></g>
    <g id="drawing-layer"></g>
    <g id="overlay-layer" pointer-events="none"></g>
  </svg>
  <div id="draw-preview"></div>
  <div id="select-preview"></div>
</div>

<!-- ── Identity bar (slides in when menu / panel active) ──────────────────── -->
<div id="idbar" aria-hidden="true">
  <a class="idbar-project" href="home.html">Togetherness Table</a>
  <span class="idbar-sep"></span>
  <span class="idbar-user">me · ????</span>
  <span class="idbar-table">#????</span>
</div>

<!-- ── Toasts ─────────────────────────────────────────────────────────────── -->
<div id="toasts" aria-live="polite"></div>

<!-- ── Info button (top-right) ────────────────────────────────────────────── -->
<button id="infoBtn" aria-label="Gestures and help" onclick="UI.openSheet('gestures')">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="12" cy="12" r="9"/>
    <path d="M12 8h.01M11 12h1v4h1"/>
  </svg>
</button>

<!-- ── Pill (bottom-centre desktop / bottom-left mobile) ──────────────────── -->
<div id="pill"></div>
<div id="toolOpts"></div>

<!-- ── Menu button (bottom-right) ─────────────────────────────────────────── -->
<button id="menuBtn" aria-label="Menu" onclick="UI.toggleMenu()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
    <circle cx="12" cy="5"  r="1.2" fill="currentColor" stroke="none"/>
    <circle cx="12" cy="12" r="1.2" fill="currentColor" stroke="none"/>
    <circle cx="12" cy="19" r="1.2" fill="currentColor" stroke="none"/>
  </svg>
</button>

<!-- ── Menu items (fan up from menu button) ───────────────────────────────── -->
<div id="menuItems">
  <div class="menu-item" onclick="UI.openSheet('edit');UI.closeMenu()">
    <span class="menu-label">Edit</span>
    <span class="menu-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
    </span>
  </div>
  <div class="menu-item" onclick="UI.openSheet('tools');UI.closeMenu()">
    <span class="menu-label">Tools</span>
    <span class="menu-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="6" width="16" height="12" rx="2"/>
      </svg>
    </span>
  </div>
  <div class="menu-item" onclick="UI.openSheet('history');UI.closeMenu()">
    <span class="menu-label">History &amp; Undo</span>
    <span class="menu-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 14L4 9l5-5"/><path d="M4 9h11a6 6 0 0 1 0 12H9"/>
      </svg>
    </span>
  </div>
  <div class="menu-item" onclick="UI.openSheet('peers');UI.closeMenu()">
    <span class="menu-label">Peers</span>
    <span class="menu-circle" style="position:relative">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="8" r="3"/><path d="M3 20a6 6 0 0 1 12 0"/>
        <circle cx="17" cy="9" r="2.5"/><path d="M16 20a5 5 0 0 1 5-5"/>
      </svg>
      <span id="offlineDot" style="position:absolute;top:-2px;right:-2px;width:12px;height:12px;border-radius:50%;border:2px solid var(--surface-solid);background:var(--warn);display:none"></span>
    </span>
  </div>
  <div class="menu-item" onclick="UI.openSheet('layers');UI.closeMenu()">
    <span class="menu-label">Layers</span>
    <span class="menu-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/><path d="M12 2L2 7l10 5 10-5z"/>
      </svg>
    </span>
  </div>
  <div class="menu-item" onclick="UI.openSheet('save');UI.closeMenu()">
    <span class="menu-label">Save / Load</span>
    <span class="menu-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/>
      </svg>
    </span>
  </div>
</div>

<!-- ── Scrim (mobile bottom-sheet backdrop) ───────────────────────────────── -->
<div id="scrim"></div>

<!-- ── Side panel (persistent desktop sidebar / full-screen mobile sheet) ─── -->
<aside id="panel" aria-hidden="true">
  <div class="grab"></div>
  <div class="panel-head">
    <h2 id="panelTitle"></h2>
    <button class="panel-close" aria-label="Close panel" onclick="UI.closePanel()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 6l12 12M18 6L6 18"/>
      </svg>
    </button>
  </div>
  <div id="panelTabs"></div>
  <div class="panel-body" id="panelBody"></div>
</aside>

<!-- ── Context popover (long-press on shape) ──────────────────────────────── -->
<div id="popover"></div>

<!-- ── Status bar (retained from old index.html for debugging) ────────────── -->
<div id="statusBar" style="position:fixed;top:0;left:50%;transform:translateX(-50%);
     font-size:11px;color:var(--text-3);pointer-events:none;z-index:100;
     display:flex;gap:10px;padding:4px 8px">
  <span id="tableLabel" style="font-family:monospace"></span>
  <span id="myIdLabel" style="font-family:monospace"></span>
  <span class="status-dot" id="statusDot" style="width:8px;height:8px;border-radius:50%;
        background:var(--warn);align-self:center;flex-shrink:0"></span>
  <span>peers: <span id="peerCount">0</span></span>
</div>

<!-- ── Module imports ─────────────────────────────────────────────────────── -->
<script type="importmap">
{
  "imports": {
    "yjs": "/lib/yjs.js",
    "y-indexeddb": "/lib/y-indexeddb.js"
  }
}
</script>

<script type="module">
import * as Y                   from '/lib/yjs.js';
import { WebrtcProvider }       from '/lib/y-webrtc.js';
import { boot, App }            from '/app.js';
import * as UI                  from '/ui.js';
import { getIdentity }               from './user.js';
import { dragPlaceholderFilterSVG, snapPointGradientSVG }  from './defs.js';
import { tablesAPI as tables } from './tables.js';

// Inject shared SVG defs (filters etc.) into the canvas <defs> element.
document.querySelector('#canvas defs')
  .insertAdjacentHTML('beforeend', dragPlaceholderFilterSVG);
document.querySelector('#canvas defs')
  .insertAdjacentHTML('beforeend', snapPointGradientSVG);


// Expose UI and App on window so inline onclick handlers in the HTML can reach them.
// This is the ONLY global we deliberately leak — everything else stays in modules.
window.UI  = UI;
window.App = App;

// ── Identity ────────────────────────────────────────────────────────────────
// Persistent identity lives in localStorage
const { name: myDisplayName, grad: myGrad, localId: myId } = getIdentity();
document.getElementById('myIdLabel').textContent = `me: ${myDisplayName}`;

// ── Table  ──────────────────────────────────────────────────────────────────
// getYDoc() opens this table's IndexedDB persistence, awaits the initial
// replay, and stamps fresh identity (docId/created/schemaVersion) into
// yMeta if this table turns out to be brand new — nothing else here needs
// to check for that.
let tableId = location.hash.slice(1);
if (!tableId) {
  tableId = tables.generateTableId(myDisplayName);
  location.hash = tableId;
}
document.getElementById('tableLabel').textContent = tableId;

const ydoc  = await tables.getYDoc(tableId);
App.addLog('loaded from indexeddb', 'local');
tables.touchTableRecord(tableId);

// Join the authority ordering only now that the local IndexedDB replay has
// landed — ensureJoined's guard needs to see this table's *existing*
// joinSequence (a returning peer's own earlier entry) before deciding
// whether to append, so a reload doesn't bump a peer to the back of the
// line.
tables.ensureJoined(ydoc, myId);

// ── WebRTC  ─────────────────────────────────────────────────────────────────
const signalingUrl = new URLSearchParams(location.search).get('signaling') || 'ws://localhost:4444';
const provider     = new WebrtcProvider(tableId, ydoc, { signaling: [signalingUrl] });
const awareness    = provider.awareness;
awareness.setLocalState({ id: myId, color: myGrad.c1, grad: myGrad, cursor: null, selection: null });

// ── Boot ────────────────────────────────────────────────────────────────────
boot({ ydoc, awareness, provider, myId, myGrad, tableId, displayName: myDisplayName });
</script>

</body>
</html>
