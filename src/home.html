<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Togetherness Table</title>
<link rel="icon" type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='black'/%3E%3Ctext x='3' y='26' font-size='26' fill='%23fffff0' font-family='serif' letter-spacing='-5'%3ETT%3C/text%3E%3C/svg%3E">
<style>
/* ── Variables (matches ui.css palette) ─────────────────── */
:root {
  --bg:            #0d0b13;
  --surface:       rgba(22, 17, 34, 0.88);
  --surface-2:     rgba(36, 29, 52, 0.75);
  --surface-solid: #1a1228;
  --text:          #ddd0b4;
  --text-2:        #8a7d68;
  --text-3:        #4e4438;
  --border:        rgba(210,185,130,0.13);
  --border-2:      rgba(210,185,130,0.26);
  --primary:       #c8941e;
  --primary-soft:  rgba(200,148,30,0.20);
  --radius:        14px;
  --radius-sm:     10px;
  --emboss:
    inset 0 2px 0 rgba(210,185,130,0.40),
    inset 0 -1px 0 rgba(0,0,0,0.55),
    0 0 0 1px rgba(0,0,0,0.70),
    0 4px 18px rgba(0,0,0,0.55);
  --emboss-lg:
    inset 0 2px 0 rgba(210,185,130,0.40),
    inset 0 -1px 0 rgba(0,0,0,0.55),
    0 0 0 1px rgba(0,0,0,0.80),
    0 12px 40px rgba(0,0,0,0.70);
  --font-body:    -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  --font-display: "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
}

*, *::before, *::after { box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Layout ──────────────────────────────────────────────── */
.layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 100vh;
}

@media (max-width: 768px) {
  .layout {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto;
  }
}

/* ── Left Panel ──────────────────────────────────────────── */
.panel {
  background: var(--surface-solid);
  border-right: 1px solid var(--border-2);
  display: flex;
  flex-direction: column;
  padding: 32px 24px 40px;
  gap: 32px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border-2) transparent;
}

@media (max-width: 768px) {
  .panel {
    position: static;
    height: auto;
    border-right: none;
    border-bottom: 1px solid var(--border-2);
    padding: 28px 20px 32px;
  }
}

/* ── Wordmark ──────────────────────────────────────────────  */
.wordmark {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.wordmark-title {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: normal;
  letter-spacing: 0.04em;
  color: var(--text);
  margin: 0;
  line-height: 1;
}

.wordmark-title span {
  color: var(--primary);
}

.wordmark-sub {
  font-size: 11px;
  color: var(--text-2);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

/* ── Section headings ──────────────────────────────────────  */
.section-label {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-3);
  margin: 0 0 10px;
  font-family: var(--font-body);
}

/* ── Profile card ──────────────────────────────────────────  */
.profile-card {
  background: var(--surface-2);
  border: 1px solid var(--border-2);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  box-shadow: var(--emboss);
}

.profile-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.gradient-swatch {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  flex-shrink: 0;
  border: 2px solid var(--border-2);
  cursor: pointer;
  transition: transform 0.15s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5);
}
.gradient-swatch:hover { transform: scale(1.08); }

.profile-name-input {
  flex: 1;
  background: rgba(0,0,0,0.35);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font-display);
  font-size: 15px;
  padding: 6px 10px;
  outline: none;
  transition: border-color 0.15s;
}
.profile-name-input:focus {
  border-color: var(--primary);
}
.profile-name-input::placeholder { color: var(--text-3); font-style: italic; }

/* gradient picker row */
.gradient-options {
  display: flex;
  gap: 8px;
  overflow: hidden;
  flex-wrap: nowrap;
}
.grad-option {
  flex: 1 1 0;
  min-width: 0;
  max-width: 26px;
  aspect-ratio: 1;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform 0.12s, border-color 0.12s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.5);
}
.grad-option:hover { transform: scale(1.15); }
.gradient-options .grad-option { display: block; width: 100%; height: 100%; }
.grad-option.active { border-color: var(--primary); }

/* ── Tables list ───────────────────────────────────────────  */
.tables-section {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.tables-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 424px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border-2) transparent;
}

.table-row {
  display: flex;
  align-items: stretch;
  gap: 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
  text-decoration: none;
  color: inherit;
}
.table-row:hover {
  background: var(--primary-soft);
  border-color: var(--border-2);
}

.table-thumb {
  display: block;
  width: 150px;
  height: 100px;
  flex-shrink: 0;
  object-fit: cover;
}
.table-thumb-placeholder {
  width: 150px;
  height: 100px;
  flex-shrink: 0;
  background: var(--surface-2);
}
.table-info {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 4px;
  padding: 10px 12px;
  min-width: 0;
}
.table-name {
  font-size: 13px;
  color: var(--text);
  font-family: var(--font-display);
  letter-spacing: 0.02em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.table-date {
  font-size: 10px;
  color: var(--text-3);
}

.table-actions {
  display: flex;
  align-self: flex-end;
  gap: 12px;
}

.table-delete {
  font-size: 11px;
  color: var(--text-3);
  background: none;
  border: none;
  padding: 2px 0;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 2px;
}
.table-delete:hover {
  color: var(--danger);
}

.table-fork {
  font-size: 11px;
  color: var(--text-3);
  background: none;
  border: none;
  padding: 2px 0;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 2px;
}
.table-fork:hover {
  color: var(--primary);
}
.table-fork:disabled {
  cursor: default;
  text-decoration: none;
  opacity: 0.6;
}

.tables-empty {
  font-size: 12px;
  color: var(--text-3);
  font-style: italic;
  padding: 6px 2px;
}

/* ── Links footer ──────────────────────────────────────────  */
.panel-footer {
  margin-top: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.footer-link {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-2);
  text-decoration: none;
  padding: 4px 2px;
  transition: color 0.12s;
}
.footer-link:hover { color: var(--primary); }
.footer-link svg { flex-shrink: 0; opacity: 0.7; }

.footer-tagline {
  font-size: 10px;
  color: var(--text-3);
  line-height: 1.5;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}

/* ── Sampler (right) ───────────────────────────────────────  */
.sampler {
  display: flex;
  flex-direction: column;
}

.sampler-row {
  position: relative;
  flex: 1;
  min-height: 200px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

@media (max-width: 768px) {
  .sampler-row { min-height: 180px; }
}

.sampler-scene {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  transition: transform 0.4s ease;
}
.sampler-row:hover .sampler-scene { transform: scale(1.03); }

/* Tint overlay — per-row colour set via --tint CSS var on the div */
.sampler-row::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--tint);
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 1;
}
.sampler-row:hover::after { opacity: 0.5; }

/* start button */
.start-btn {
  pointer-events: none;
  position: absolute;
  z-index: 2;
  background: rgba(14, 10, 22, 0.82);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(200,148,30,0.55);
  color: var(--primary);
  font-family: var(--font-display);
  font-size: 15px;
  letter-spacing: 0.08em;
  padding: 11px 28px;
  border-radius: 40px;
  cursor: pointer;
  box-shadow:
    inset 0 1px 0 rgba(210,185,130,0.30),
    0 0 0 1px rgba(0,0,0,0.6),
    0 8px 30px rgba(0,0,0,0.6),
    0 0 20px rgba(200,148,30,0.10);
  transition: background 0.15s, box-shadow 0.15s, transform 0.12s, color 0.15s;
  white-space: nowrap;
}
.start-btn:hover {
  background: rgba(200,148,30,0.18);
  color: #e8b84a;
  box-shadow:
    inset 0 1px 0 rgba(210,185,130,0.40),
    0 0 0 1px rgba(200,148,30,0.45),
    0 0 24px rgba(200,148,30,0.25),
    0 8px 30px rgba(0,0,0,0.6);
  transform: scale(1.04);
}
.start-btn:active { transform: scale(0.97); }

/* separator lines between rows */
.sampler-row + .sampler-row::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: rgba(210,185,130,0.12);
  z-index: 1;
}

/* ── Ripple / transition overlay ───────────────────────────  */
#ripple {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  overflow: hidden;
}
#ripple-circle {
  position: absolute;
  border-radius: 50%;
  background: var(--bg);
  transform: scale(0);
  transform-origin: center;
  transition: none;
  width: 10px;
  height: 10px;
}

/* ── Scroll fade-ins ───────────────────────────────────────  */
.fade-in {
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.45s ease, transform 0.45s ease;
}
.fade-in.visible {
  opacity: 1;
  transform: none;
}
</style>

<script type="module">
import * as Y                   from 'yjs';
import { mirrorYNode, buildThumbSVG, THUMB_W, THUMB_H } from './home-utils.js';
import { populateFromSvgDoc }   from './storage.js';
import * as Toys                from './toys.js';

import { entityGradient }        from './entity_gradient.js';
import { getIdentity, setName, setGrad } from './user.js';
import { tablesAPI as tables } from './tables.js';

function drawGradientSwatch(canvas, gradObj) {
  const ctx  = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
  grad.addColorStop(0, gradObj.c1);
  grad.addColorStop(1, gradObj.c2);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.beginPath();
  ctx.arc(canvas.width/2, canvas.height/2, canvas.width/2, 0, Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();
}

// ── Profile UI ────────────────────────────────────────────────────────────
// Player identity lives in localStorage, key 'tt_player' (see user.js).
// index.html reads from the same store on boot.

const displayNameEl = document.getElementById('displayName');
const swatchEl      = document.getElementById('gradientSwatch');
const gradOptsEl    = document.getElementById('gradientOptions');

let _grad = null;  // full entityGradient() output, stored frozen

function initProfile() {
  const { name, grad } = getIdentity();
  _grad = grad;

  displayNameEl.value = name;
  refreshSwatch();
  renderGradOptions();
}

function refreshSwatch() {
  drawGradientSwatch(swatchEl, _grad);
}

function renderGradOptions() {
  gradOptsEl.innerHTML = '';
  const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  for (let i = 0; i < 20; i++) {
    const seed      = Array.from({ length: 8 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    const presetGrad = entityGradient(seed);
    const c = document.createElement('canvas');
    c.className = 'grad-option';
    c.width = 26; c.height = 26;
    if (_grad && presetGrad.c1 === _grad.c1 && presetGrad.c2 === _grad.c2) {
      c.classList.add('active');
    }
    drawGradientSwatch(c, presetGrad);
    c.addEventListener('click', () => {
      _grad = presetGrad;
      document.querySelectorAll('.grad-option').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      setGrad(_grad);
      refreshSwatch();
    });
    gradOptsEl.appendChild(c);
  }
}

swatchEl.addEventListener('click', () => {
  _grad = entityGradient('rng_' + Math.random().toString(36).slice(2));
  document.querySelectorAll('.grad-option').forEach(x => x.classList.remove('active'));
  setGrad(_grad);
  refreshSwatch();
});

displayNameEl.addEventListener('input', () => {
  setName(displayNameEl.value.trim());
});

initProfile();

// ── Previous tables ───────────────────────────────────────────────────────

async function makeThumbnail(tableId) {
  try {
    const ydoc  = await tables.loadTableDoc(tableId);
    const yMeta = ydoc.getMap('meta');
    const yToys = ydoc.getXmlFragment('toys');

    const bgUrl = yMeta.get('bg_url')    || 'img/bg_default.png';
    const bgW   = yMeta.get('bg_width')  || 120;
    const bgH   = yMeta.get('bg_height') || 120;

    // Topmost toy = last in yToys (insertion order = z-order)
    const all    = yToys.toArray().filter(n => n instanceof Y.XmlElement);
    const topToy = all.length ? all[all.length - 1] : null;
    const toyEl  = topToy ? mirrorYNode(Y, topToy) : null;
    toyEl.firstChild.setAttribute('width', '100');
    toyEl.firstChild.setAttribute('height', '100');

    ydoc.destroy();
    return buildThumbSVG(tableId, bgUrl, bgW, bgH, toyEl);
  } catch (e) {
    console.warn('togetherness: thumbnail failed for', tableId, e);
    return null;
  }
}

function renderTables() {
  const list = tables.loadTables();
  const el   = document.getElementById('tablesList');
  if (!list.length) {
    el.innerHTML = '<div class="tables-empty">No previous tables yet.<br>Start one from the right →</div>';
    return;
  }
  el.innerHTML = '';
  list.slice().reverse().forEach(t => {
    const a = document.createElement('a');
    a.className = 'table-row';
    a.href = `index.html#${encodeURIComponent(t.id)}`;

    // Placeholder shown while thumbnail loads async
    const placeholder = document.createElement('div');
    placeholder.className = 'table-thumb-placeholder';
    a.appendChild(placeholder);

    const info = document.createElement('div');
    info.className = 'table-info';

    const name = document.createElement('span');
    name.className = 'table-name';
    name.textContent = t.name || t.id;

    const date = document.createElement('span');
    date.className = 'table-date';
    date.textContent = new Date(t.lastVisit).toISOString().slice(0, 10);

    const del = document.createElement('button');
    del.type = 'button';
    del.className = 'table-delete';
    del.textContent = 'Delete';
    del.addEventListener('click', (e) => {
      // Row is an <a>; stop the click from also navigating to the table.
      e.preventDefault();
      e.stopPropagation();
      if (confirm(`Delete "${t.name || t.id}"? This can't be undone.`)) {
        tables.deleteTable(t.id);
        renderTables();
      }
    });

    const fork = document.createElement('button');
    fork.type = 'button';
    fork.className = 'table-fork';
    fork.textContent = 'Duplicate (Fork)';
    fork.addEventListener('click', async (e) => {
      // Row is an <a>; stop the click from also navigating to the table.
      e.preventDefault();
      e.stopPropagation();
      fork.disabled = true;
      fork.textContent = 'Forking…';
      try {
        const forkTail = '-' + tables.randSlug()
        const forkedId = tables.generateTableId(t.name || t.id) + forkTail;
        const forkedName = t.name ? t.name + forkTail : forkedId;
        await tables.forkTable(t.id, forkedId);
        tables.touchTableRecord(forkedId, { name: forkedName });
        renderTables();
      } catch (err) {
        console.error('togetherness: fork failed for', t.id, err);
        fork.disabled = false;
        fork.textContent = 'Duplicate (Fork)';
        alert('Fork failed — see console for details.');
      }
    });

    const actions = document.createElement('div');
    actions.className = 'table-actions';
    actions.append(fork, del);

    info.append(name, date, actions);
    a.appendChild(info);
    el.appendChild(a);

    // Load thumbnail async, swap in when ready
    makeThumbnail(t.id).then(svg => {
      if (svg) placeholder.replaceWith(svg);
    });
  });
}
renderTables();

// On back-navigation (bfcache restore): reset ripple and refresh tables list.
window.addEventListener('pageshow', () => {
  const circle = document.getElementById('ripple-circle');
  circle.style.transition = 'none';
  circle.style.transform  = 'scale(0)';
  renderTables();
});

// ── Sampler dice: render the real toy/dice_d6.svg content ────────────────────
// The homepage used to hand-author simplified stand-in dice markup, which
// could silently drift from the actual toy file's artwork/structure. Instead,
// build each sample die via the same Toys.addToy → mirror pipeline a real
// in-app placement uses, into a throwaway Y.Doc that's never persisted or
// connected to anything — purely for display. Position/rotation are display
// choices only (not stored), matched to the sampler's original layout.
const DICE_LAYOUT = [
  { cx: 105, cy: 100, rotate: -8 },
  { cx: 235, cy: 100, rotate:  4 },
  { cx: 365, cy: 100, rotate: -3 },
  { cx: 495, cy: 100, rotate:  9 },
];
const SAMPLER_DICE = [
  { rowIndex: 0, colors: ['#191e78', '#3c14a0', '#0a0a5a', '#5a28b4'], faces: [6, 4, 1, 5] },
  { rowIndex: 1, colors: ['#f0e6c8', '#f0e6c8', '#f0e6c8', '#f0e6c8'], faces: [3, 6, 2, 4] },
  { rowIndex: 2, colors: ['#be1414', '#be1414', '#be1414', '#be1414'], faces: [1, 3, 5, 2] },
  { rowIndex: 3, colors: ['#641ea0', '#1e823c', '#6e4114', '#82828c'], faces: [5, 2, 6, 3] },
];

async function renderSamplerDice() {
  const rows    = document.querySelectorAll('svg.sampler-scene');
  const scratch = new Y.Doc();               // display-only, never persisted
  const yToys   = scratch.getXmlFragment('toys');

  for (const { rowIndex, colors, faces } of SAMPLER_DICE) {
    const toysLayerEl = rows[rowIndex]?.querySelector('#toys-layer');
    if (!toysLayerEl) continue;
    for (let i = 0; i < DICE_LAYOUT.length; i++) {
      const { cx, cy, rotate } = DICE_LAYOUT[i];
      const id = `sample-s${rowIndex}d${i}`;
      // Sequential await: addToy only fetches toy/dice_d6.svg once (cached
      // after the first call) — running these concurrently would race
      // multiple fetches before the cache is warm.
      await Toys.addToy(scratch, yToys, { id, toyType: 'dice_d6', x: cx, y: cy, color: colors[i] });
      const el = Toys._toSVGEl(Toys.findToy(yToys, id));
      el.setAttribute('transform', `rotate(${rotate},${cx},${cy})`);
      el.setAttribute('style', 'filter:drop-shadow(0 4px 10px rgba(0,0,0,0.75))');
      // Cosmetic only: pick a varied face per sample die, same DOM tweak the
      // toy's own turn_handler script performs — no Yjs write.
      const tspan = el.querySelector('tspan');
      if (tspan) tspan.textContent = String(faces[i]);
      toysLayerEl.appendChild(el);
    }
  }
}
const samplerDiceReady = renderSamplerDice().catch(err => {
  console.error('togetherness: sampler dice render failed', err);
});

// ── Seed a new table from a sample SVG into IndexedDB ────────────────────────
// Uses the shared storage.js import machinery (also used by app.js's
// importSVG) to read background/toys/drawing from a sampler template into a
// fresh Y.Doc, then persists it via tables.js's openTablePersistence before
// navigating.
async function seedTable(tableId, sampleSvgEl) {
  const CURRENT_SCHEMA = 4;

  // Guard against a click landing before the sampler dice finish rendering
  // (single network fetch, so this resolves almost immediately in practice).
  await samplerDiceReady;

  const ydoc         = new Y.Doc();
  const yMeta        = ydoc.getMap('meta');
  const yToys        = ydoc.getXmlFragment('toys');
  const yDrawing     = ydoc.getXmlFragment('drawing');

  ydoc.transact(() => {
    yMeta.set('docId',         tableId);
    yMeta.set('created',       new Date().toISOString());
    yMeta.set('schemaVersion', CURRENT_SCHEMA);
    // Sampler templates carry a decorative rotation on each toy <g> for
    // homepage visual flair — not part of the canonical seeded document.
    populateFromSvgDoc(sampleSvgEl, { yMeta, yToys, yDrawing }, { stripToyDecorative: true });
  });

  // Persist to IndexedDB and wait for it to flush before navigating.
  await new Promise((resolve, reject) => {
    const persistence = tables.openTablePersistence(tableId, ydoc);
    persistence.on('synced', resolve);
    persistence.on('error',  reject);
  });
}

// ── Wire sampler row clicks to static HTML rows ──────────────────────────────
document.querySelectorAll('.sampler-row').forEach(el => {
  el.addEventListener('click', e => {
    const svgEl = el.querySelector('svg.sampler-scene');
    launchRipple(e.clientX, e.clientY, svgEl);
  });
});

// ── Ripple transition + table seeding ─────────────────────────────────────────
function launchRipple(cx, cy, svgEl) {
  const circle = document.getElementById('ripple-circle');
  const maxDist = Math.hypot(
    Math.max(cx, window.innerWidth  - cx),
    Math.max(cy, window.innerHeight - cy)
  );
  const diameter = maxDist * 2.2;
  circle.style.transition = 'none';
  circle.style.width      = diameter + 'px';
  circle.style.height     = diameter + 'px';
  circle.style.left       = (cx - diameter/2) + 'px';
  circle.style.top        = (cy - diameter/2) + 'px';
  circle.style.transform  = 'scale(0)';
  circle.getBoundingClientRect();
  circle.style.transition = 'transform 0.55s cubic-bezier(0.4,0,0.2,1)';
  circle.style.transform  = 'scale(1)';

  const tableId = tables.generateTableId(displayNameEl.value.trim());
  tables.touchTableRecord(tableId);

  // Seed the table into IndexedDB, then navigate once done (or after the
  // ripple animation completes, whichever is later).
  const seedDone    = seedTable(tableId, svgEl);
  const rippleDone  = new Promise(r => setTimeout(r, 520));
  Promise.all([seedDone, rippleDone]).then(() => {
    window.location.href = `index.html#${tableId}`;
  }).catch(err => {
    console.error('togetherness: table seed failed', err);
    window.location.href = `index.html#${tableId}`;
  });
}

// ── Intersection observer for fade-ins ────────────────────────────────────────
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
  });
}, { threshold: 0.05 });

document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
</script>
