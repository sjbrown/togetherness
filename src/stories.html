// ── CANVAS SHAPES ────────────────────────────────────────────────────────────
// These stories render actual SVG shapes via _toSVGEl + the real overlay.js.
// No CRDT or network: shapes are created directly from attrs.
// Overlay.init() receives a minimal fake App that answers getShapeBBox,
// getViewScale, getMyColor, and getMyGradient from local data.

import * as Overlay from '/overlay.js';
import { getGeom, SHAPE_TYPES } from '/drawing.js';
import { entityGradient } from '/entity_gradient.js';
import { dragPlaceholderFilterSVG } from '/defs.js';

const SVG_NS = 'http://www.w3.org/2000/svg';
const myGrad = entityGradient('stories-user');

// Build a plain SVG element for a shape (no CRDT needed).
function shapeEl(type, geom, fill) {
  const def = SHAPE_TYPES[type];
  const el  = document.createElementNS(SVG_NS, def.tag);
  el.setAttribute('fill', fill);
  el.setAttribute('stroke', 'none');
  for (const [k, v] of Object.entries(geom)) el.setAttribute(k, String(v));
  return el;
}

// Build an SVG stage with a drawing layer, optional overlay layer, and shapes.
// Returns the SVG element (already has shapes appended).
function buildStageSVG(shapes) {
  const svg = document.createElementNS(SVG_NS, 'svg');
  svg.setAttribute('viewBox', '0 0 240 160');
  svg.setAttribute('width',   '240');
  svg.setAttribute('height',  '160');
  svg.style.cssText = 'display:block;width:100%;height:100%;';

  const drawing = document.createElementNS(SVG_NS, 'g');
  drawing.id = 'drawing-layer';
  const overlayG = document.createElementNS(SVG_NS, 'g');
  overlayG.id = 'overlay-layer';

  for (const { id, type, geom, fill } of shapes) {
    const el = shapeEl(type, geom, fill);
    el.setAttribute('data-yid',        id);
    el.setAttribute('data-layer-type', 'drawing');
    drawing.appendChild(el);
  }
  svg.append(drawing, overlayG);
  return svg;
}

// Create a fake App sufficient for overlay.render().
function fakeOverlayApp(svgEl) {
  return {
    getViewScale:   () => 1,
    getMyColor:     () => myGrad.c1,
    getMyGradient:  () => myGrad,
    getShapeBBox: (id) => {
      const el = svgEl.querySelector(`[data-yid="${id}"]`);
      return el ? getGeom(el) : null;
    },
  };
}

// Render a self-contained canvas story.
function canvasStory(label, variant, shapes, selectionKind, selectedId, remoteColor) {
  story(label, variant, () => {
    const svg = buildStageSVG(shapes);

    Overlay.SelectionMode.clear();
    if (selectedId && selectionKind === 'local') {
      Overlay.SelectionMode.set(selectedId, { kind: 'local', color: myGrad.c1, grad: myGrad });
    } else if (selectedId && selectionKind === 'remote') {
      Overlay.SelectionMode.set(selectedId, { kind: 'remote', peerId: 'Mara', color: remoteColor ?? '#5a7ea8' });
    }

    Overlay.init(fakeOverlayApp(svg), svg);
    Overlay.render();
    return svg;
  });
}

// ── Drag ghost stories ────────────────────────────────────────────────────────
// These build a self-contained SVG that demonstrates the <use>-based drag
// overlay visuals. The native layer element has id="yid-{id}" so the overlay
// can reference it with <use href="...">.

function buildDragStageSVG(shapes) {
  const SVGNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(SVGNS, 'svg');
  svg.setAttribute('viewBox', '0 0 300 200');
  svg.style.cssText = 'width:300px;height:200px;background:#1a1a2e;border-radius:6px;overflow:visible';

  // defs: local grad + placeholder filter (imported from defs.js — single source of truth)
  const defs = document.createElementNS(SVGNS, 'defs');
  defs.innerHTML = `
    ${dragPlaceholderFilterSVG}
    <linearGradient id="story-local-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="${myGrad.c1}"/>
      <stop offset="100%" stop-color="${myGrad.c2 ?? myGrad.c1}"/>
    </linearGradient>`;
  svg.appendChild(defs);

  // Native layer — shapes with id="yid-{id}"
  const layer = document.createElementNS(SVGNS, 'g');
  layer.id = 'story-native-layer';
  shapes.forEach(s => {
    const el = document.createElementNS(SVGNS, s.type === 'circle' ? 'circle' : 'rect');
    el.setAttribute('id',   `yid-${s.id}`);
    el.setAttribute('fill', s.fill);
    if (s.type === 'circle') {
      el.setAttribute('cx', s.geom.cx); el.setAttribute('cy', s.geom.cy); el.setAttribute('r', s.geom.r);
    } else {
      el.setAttribute('x', s.geom.x); el.setAttribute('y', s.geom.y);
      el.setAttribute('width', s.geom.width); el.setAttribute('height', s.geom.height);
      if (s.geom.rx) el.setAttribute('rx', s.geom.rx);
    }
    layer.appendChild(el);
  });
  svg.appendChild(layer);

  // Overlay layer
  const overlay = document.createElementNS(SVGNS, 'g');
  overlay.id = 'overlay-layer';
  overlay.setAttribute('pointer-events', 'none');
  svg.appendChild(overlay);

  return svg;
}

story('Drag ghost', 'placeholder at committed · ghost at drag pos', () => {
  const shapes = [{ id:'dg1', type:'rect', geom:{ x:20, y:60, width:90, height:60 }, fill:'#c8941e' }];
  const svg = buildDragStageSVG(shapes);
  const SVGNS = 'http://www.w3.org/2000/svg';
  const overlay = svg.querySelector('#overlay-layer');

  // Dim placeholder at committed position
  const ph = document.createElementNS(SVGNS, 'use');
  ph.setAttribute('href', '#yid-dg1');
  ph.setAttribute('filter', 'url(#drag-placeholder-filter)');
  overlay.appendChild(ph);

  // Flying ghost translated +100,+50
  const ghost = document.createElementNS(SVGNS, 'use');
  ghost.setAttribute('href', '#yid-dg1');
  ghost.setAttribute('transform', 'translate(100, 50)');
  ghost.setAttribute('opacity', '0.85');
  overlay.appendChild(ghost);

  // Dashed ring around ghost
  const ring = document.createElementNS(SVGNS, 'rect');
  ring.setAttribute('x', 20 + 100 - 6); ring.setAttribute('y', 60 + 50 - 6);
  ring.setAttribute('width', 90 + 12); ring.setAttribute('height', 60 + 12);
  ring.setAttribute('rx', 4); ring.setAttribute('fill', 'none');
  ring.setAttribute('stroke', 'url(#story-local-grad)');
  ring.setAttribute('stroke-width', 2); ring.setAttribute('stroke-dasharray', '6 3');
  overlay.appendChild(ring);

  return svg;
});

  // Dim placeholder

  // Remote ghost at +80, +40

  ghost.setAttribute('transform', 'translate(80, 40)');
  ghost.setAttribute('opacity', '0.85');
  overlay.appendChild(ghost);

  // Remote dashed ring
  const ring = document.createElementNS(SVGNS, 'rect');
  ring.setAttribute('x', 20 + 80 - 6); ring.setAttribute('y', 60 + 40 - 6);
  ring.setAttribute('width', 90 + 12); ring.setAttribute('height', 60 + 12);
  ring.setAttribute('rx', 6); ring.setAttribute('fill', 'none');

  ring.setAttribute('stroke-width', 1.5); ring.setAttribute('stroke-dasharray', '4 3');

  label.setAttribute('font-family', 'ui-monospace, Menlo, monospace');
  label.setAttribute('fill', peerColor);
  label.textContent = 'Mara';
  overlay.appendChild(label);

  return svg;
});

story('Drag ghost', 'local + remote simultaneous', () => {
  const shapes = [
    { id:'dg3', type:'rect',   geom:{ x:15,  y:50,  width:80, height:60 }, fill:'#c8941e' },
    { id:'dg4', type:'circle', geom:{ cx:210, cy:100, r:40 },              fill:'#5a7ea8' },
  ];
  const svg = buildDragStageSVG(shapes);
  const SVGNS = 'http://www.w3.org/2000/svg';
  const overlay = svg.querySelector('#overlay-layer');
  const peerColor = '#8a5ea8';

  // Local drag: rect (dg3) shifted right
  const ph3 = document.createElementNS(SVGNS, 'use');
  ph3.setAttribute('href', '#yid-dg3'); ph3.setAttribute('filter', 'url(#drag-placeholder-filter)');
  overlay.appendChild(ph3);
  const g3 = document.createElementNS(SVGNS, 'use');
  g3.setAttribute('href', '#yid-dg3'); g3.setAttribute('transform', 'translate(60, 20)'); g3.setAttribute('opacity', '0.85');
  overlay.appendChild(g3);
  const r3 = document.createElementNS(SVGNS, 'rect');
  r3.setAttribute('x', 15+60-6); r3.setAttribute('y', 50+20-6); r3.setAttribute('width', 80+12); r3.setAttribute('height', 60+12);
  r3.setAttribute('rx', 4); r3.setAttribute('fill', 'none'); r3.setAttribute('stroke', 'url(#story-local-grad)'); r3.setAttribute('stroke-width', 2); r3.setAttribute('stroke-dasharray', '6 3');
  overlay.appendChild(r3);

  // Remote drag: circle (dg4) shifted left
  const ph4 = document.createElementNS(SVGNS, 'use');
  ph4.setAttribute('href', '#yid-dg4'); ph4.setAttribute('filter', 'url(#drag-placeholder-filter)');
  overlay.appendChild(ph4);
  const g4 = document.createElementNS(SVGNS, 'use');
  g4.setAttribute('href', '#yid-dg4'); g4.setAttribute('transform', 'translate(-50, -20)'); g4.setAttribute('opacity', '0.85');
  overlay.appendChild(g4);
