        <ellipse
           style="fill:none;fill-opacity:1;stroke:url(#linearGradient87248);stroke-width:0.468465;stroke-linejoin:round;stroke-dasharray:none;stroke-opacity:1;paint-order:stroke fill markers"
           id="path87240"
