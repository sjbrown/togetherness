  </defs>

  <script
     type="text/javascript"
     src="js/tray.js"
     data-namespace="tray"
     id="script_tray" />
  <script
     type="text/javascript"
     data-namespace="bag"
     id="script_bag"><![CDATA[

var bag = {

  menu: {
    'Roll All': {
      eventName: 'tray_roll',
      applicable: (node) => { return true },
      handler: function(evt) {
        return tray.roll_all(this)
      },
    },
    'Take': {
      eventName: 'bag_take',
      applicable: (node) => { return bag._contents(node).length > 0 },
      handler: function(evt) {
        bag._take(this)
      },
    },
  },

  // Direct .toy children of elem's own contents_group, as an array.
  _contents: function(elem) {
    const items = []
    tray.visit_contents_group(elem, (child) => items.push(child))
    return items
  },

  // Pick one contained toy at random and move it out to the top level of
  // the toys layer, translating its position from bag-relative to
  // canvas-absolute (the same translation applyMoveCommit does in
  // reverse when something is dropped INTO a tray) so it lands near the
  // bag rather than wherever its old tray-relative x/y happens to land
  // at the top level.
  //
  // The move itself is a plain DOM appendChild. The envelope watches the
  // whole #toys-layer, not just this toy's own subtree, so a childList
  // mutation that moves a node from our contents_group up to the layer
  // is captured and translated into a Yjs reparent like any other
  // handler mutation -- see TOYS.md, "The envelope".
  _take: function(elem) {
    const items = bag._contents(elem)
    if (!items.length) return
    const chosen = items[Math.floor(Math.random() * items.length)]

    const ownSvg = elem.querySelector(':scope > svg')
    const bagX = parseFloat(ownSvg && ownSvg.getAttribute('x')) || 0
    const bagY = parseFloat(ownSvg && ownSvg.getAttribute('y')) || 0

    const chosenSvg = chosen.querySelector(':scope > svg')
    if (chosenSvg) {
      const relX = parseFloat(chosenSvg.getAttribute('x')) || 0
      const relY = parseFloat(chosenSvg.getAttribute('y')) || 0
      chosenSvg.setAttribute('x', String(bagX + relX))
      chosenSvg.setAttribute('y', String(bagY + relY))
    }

    const toysLayer = elem.closest('#toys-layer')
    if (!toysLayer) throw new Error('[bag] take: no #toys-layer ancestor found')
    toysLayer.appendChild(chosen)
  },

}

    ]]></script>

  <!-- Invisible hit-testing floor for the whole bag, same pattern as
       tray_*.svg — contained toys are pointer-events:none, so a click
       anywhere over the bag (including over the closed body or straight
       through to a gap where contents show) hits this instead. -->
  <rect class="hit_plate" x="0" y="0" width="100%" height="100%" fill="transparent" />

  <g class="contents_group"></g>

  <!-- The closed-bag body — geometry and style copied verbatim from
       tray_sum.svg's rect_contents, deliberately NOT wrapped in
       wh_follow_resize (contrast tray_sum, where the equivalent rect
       DOES scale with the toy). That's the whole mechanism: because this
       rect's x/y/width/height stay literally fixed while the toy's own
       viewBox is rewritten to exactly match width/height on every resize
       (1 user-unit == 1 rendered pixel, always — see applyResizeCommit
       in toys.js), this rect's on-screen size never changes as the toy
       is resized. At the toy's default/minimum size it covers (near)
       the whole toy, hiding contents_group beneath it (closed bag);
       resized larger, it covers proportionally less, revealing
       contents_group around it (open bag). Last in document order so it
       paints OVER contents_group. -->
  <rect
     id="rect_contents"
     fill="#d7d7d7"
     style="stroke:#3b3b3b;stroke-width:3.2;stroke-linecap:square"
     x="3.6" y="11.38" width="213.4" height="106.7"
     rx="10" ry="10" />

  <!-- The bag_icon glyph, decorating the closed body above. A
       zero-length path — markers only render on path/line/polyline/
       polygon, never on rect/circle/ellipse, so this can't be a <rect>
       the way the original sketch had it, and the "M x,y" moveto alone
       isn't enough to establish a marker vertex either (Chromium; needs
       an explicit, even zero-length, drawn segment) — hence "L x,y" to
       the same point. -->
  <path id="bag_anchor" d="M 110.3,24 L 110.3,24" fill="none" stroke="none" marker-start="url(#bag_icon)" />

</svg>
