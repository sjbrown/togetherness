        <circle
           style="fill:none;fill-opacity:1;stroke:url(#linearGradient101566);stroke-width:0.532763;stroke-linejoin:round;stroke-dasharray:none;stroke-opacity:1;paint-order:stroke fill markers"
           id="ellipse101564"
