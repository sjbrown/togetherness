    <!--
      bag_icon — a decorative accent on top of rect_contents (below), not
      itself responsible for covering the toy. Rendered via marker-start
      on a zero-length path (see the #bag_anchor path below). markerUnits
      is userSpaceOnUse rather than the SVG default (strokeWidth) so its
      rendered size is an explicit, unambiguous markerWidth/markerHeight —
      not something that could accidentally start tracking a stroke-width
      value someone sets later.

      Sized as a fraction of rect_contents' real height (106.7, copied
      from tray_sum.svg) rather than an independently-guessed number:
      markerHeight = 106.7 * 0.4 ≈ 43, markerWidth keeps the artwork's own
      aspect ratio (19.043247 / 25.120527 ≈ 0.758). Positioned at
      rect_contents' horizontal center, near its top edge (the marker's
      own refX/refY anchor near the top of its artwork, like a bag's
      neck) — see the #bag_anchor path's d attribute.
    -->
    <marker
       id="bag_icon"
       markerUnits="userSpaceOnUse"
       markerWidth="32.6"
       markerHeight="43"
       refX="-0.51131719"
       refY="4.7284288"
       orient="auto"
       viewBox="0 0 25.285857 25.285857"
       preserveAspectRatio="xMidYMid meet"
       >
      <g id="g_bag">
        <ellipse
           style="fill:#000000;fill-opacity:0.427726;stroke:none;stroke-width:0.590925;stroke-linejoin:round;stroke-dasharray:none;stroke-opacity:1;paint-order:stroke fill markers"
           id="path101342"
           cx="14.409167"
           cy="21.181854"
           rx="12.322562"
           ry="8.8221397" />
        <circle
           style="fill:url(#linearGradient60896);fill-opacity:1;stroke:url(#linearGradient11730);stroke-width:1.1;stroke-dasharray:none;paint-order:stroke fill markers"
           id="path11645"
           cx="14.409167"
           cy="14.409164"
           r="13.859164" />
        <circle
           style="fill:url(#radialGradient21176);fill-opacity:1;stroke:url(#linearGradient49500);stroke-width:1;stroke-dasharray:none;paint-order:stroke fill markers"
           id="circle11699"
