       stroke:#ffffff;stroke-width:0.53;stroke-linecap:round;stroke-linejoin:round;
       stroke-opacity:1
       "
       d="m 98.76566,10.451271 c 0.8407,-1.2163424 1.42749,-2.227745 3.21826,-3.4940918 1.8167,-1.2846768 2.92248,-1.8679303 4.64307,-2.0646748"
       />
  </svg>
</svg>
