name: crdt-svg

services:
  app:
    image: python:3.12-slim
    ports:
      - "3000:8000"
    volumes:
      # Hot-reload without rebuild — mount src directly
      - ./src:/app/
    working_dir: /app
    command: python -m http.server 8000
    depends_on:
      - signaling
    stop_grace_period: 0s

  signaling:
    build:
      context: .
      dockerfile: docker/signaling.Dockerfile
    ports:
      - "4444:4444"
    environment:
      - LOG=y-webrtc
    restart: unless-stopped
    stop_grace_period: 0s
